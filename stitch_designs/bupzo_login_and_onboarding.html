<div>

<div class="relative">
<span class="absolute inset-y-0 left-0 flex items-center pl-3 text-on-surface-variant material-symbols-outlined">call</span>
<input class="w-full pl-10 pr-4 py-3 bg-surface border border-outline-variant rounded-lg focus:outline-none focus:border-secondary focus:ring-1 focus:ring-secondary inner-shadow-input font-body-md text-body-md transition-all" id="mobile" placeholder="+1 (555) 000-0000" type="tel"/>
</div>
</div>
<div class="flex items-center justify-between">
<label class="flex items-center space-x-2 cursor-pointer">
<input class="w-4 h-4 rounded border-outline-variant text-secondary focus:ring-secondary" type="checkbox"/>
<span class="font-body-sm text-body-sm text-on-surface-variant">I agree to the <a class="text-secondary hover:underline" href="#">Privacy Policy</a></span>
</label>
</div>
<button class="w-full py-3 bg-secondary text-on-secondary rounded-lg font-label-md text-label-md shadow-[0_2px_4px_rgba(86,82,100,0.05)] hover:shadow-[0_10px_15px_-3px_rgba(86,82,100,0.1)] transition-all flex items-center justify-center gap-2 border-t border-white/20" type="submit">
                    Send OTP
                    <span class="material-symbols-outlined text-sm">arrow_forward</span>
</button>
</form>
<!-- Alternative Auth Methods -->
<div class="mt-8 fade-in-up delay-300">

<div class="flex-grow border-t border-outline-variant"></div>
<span class="flex-shrink-0 mx-4 font-label-md text-label-md text-outline">OR CONTINUE WITH</span>
<div class="flex-grow border-t border-outline-variant"></div>
</div>
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-2 py-2.5 bg-surface-container-low border border-outline-variant rounded-lg font-label-md text-label-md text-on-surface hover:bg-surface-variant transition-colors shadow-sm">
<span class="material-symbols-outlined text-[#25D366]">chat</span>
                        WhatsApp OTP

<button class="flex items-center justify-center gap-2 py-2.5 bg-surface-container-low border border-outline-variant rounded-lg font-label-md text-label-md text-on-surface hover:bg-surface-variant transition-colors shadow-sm">
