services:
  db:
    image: pgvector/pgvector:pg15
    container_name: bupzo_db_new # PostgreSQL with pgvector support
    environment:
      POSTGRES_USER: bupzo_user
      POSTGRES_PASSWORD: bupzo_password
      POSTGRES_DB: bupzo_db
    volumes:
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
      - pgdata_new:/var/lib/postgresql/data # Persist database data
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bupzo_user -d bupzo_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: bupzo_redis_new # Redis for caching and pub/sub
    ports:
      - "6381:6379"
    volumes:
      - redisdata_new:/data # Persist Redis data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2023-05-04T21-44-30Z
    container_name: bupzo_minio_new # Local S3 compatible storage
    ports:
      - "9002:9000"
      - "9003:9001"
    environment:
      MINIO_ROOT_USER: minio_admin
      MINIO_ROOT_PASSWORD: minio_password
    volumes:
      - miniodata_new:/data # Persist MinIO data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend-api:
    build:
      context: ./bupzo-backend
      dockerfile: Dockerfile # FastAPI backend
    container_name: bupzo_backend_new 
    environment:
      DATABASE_URL: postgresql://bupzo_user:bupzo_password@db:5432/bupzo_db
      REDIS_URL: redis://redis:6379
      GEMINI_API_KEY: ${GEMINI_API_KEY} # Loaded from .env
      WHATSAPP_API_TOKEN: ${WHATSAPP_API_TOKEN} # Loaded from .env
      BREVO_API_KEY: ${BREVO_API_KEY} # Loaded from .env
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minio_admin
      MINIO_SECRET_KEY: minio_password
      MINIO_BUCKET: bupzo-assets
    ports:
      - "8004:8000"
    depends_on: # Ensure DB, Redis, MinIO are healthy before starting
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./bupzo-backend:/app # Mount backend code
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  mcp-server:
    build:
      context: ./bupzo-mcp
      dockerfile: Dockerfile
    container_name: bupzo_mcp_new
    environment:
      REDIS_URL: redis://redis:6379 
      DATABASE_URL: postgresql://bupzo_user:bupzo_password@db:5432/bupzo_db
      GEMINI_API_KEY: ${GEMINI_API_KEY} # Loaded from .env
      WHATSAPP_API_TOKEN: ${WHATSAPP_API_TOKEN} # Loaded from .env
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minio_admin
      MINIO_SECRET_KEY: minio_password
      MINIO_BUCKET: bupzo-assets
    ports:
      - "3014:3004"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy 
    volumes:
      - ./bupzo-mcp:/app
      - /app/node_modules
    command: ["node", "index.js"]
  
  frontend-client:
    build:
      context: ./bupzo-frontend
      dockerfile: Dockerfile.dev
    container_name: bupzo_frontend_client_new
    ports:
      - "3013:3000"
    environment: # Frontend environment variables
      NEXT_PUBLIC_API_URL: http://localhost:8004 # Connects to backend-api
      NEXT_PUBLIC_MCP_URL: http://localhost:3014 # Connects to mcp-server
      NEXT_PUBLIC_PORT: 3013 # Port for Next.js dev server
      NEXT_PUBLIC_SUPABASE_URL: ${SUPABASE_URL} # Loaded from .env
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY} # Loaded from .env
    volumes:
      - ./bupzo-frontend:/app
      - /app/node_modules # Avoids re-installing node_modules inside container
    command: ["npm", "run", "dev"]

  frontend-admin:
    build:
      context: ./bupzo-admin
      dockerfile: Dockerfile # Admin dashboard
    container_name: bupzo_frontend_admin_new
    ports:
      - "3015:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8004
      NEXT_PUBLIC_MCP_URL: http://localhost:3014
      NEXT_PUBLIC_PORT: 3015
      NEXT_PUBLIC_SUPABASE_URL: ${SUPABASE_URL} # Loaded from .env
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY} # Loaded from .env
    volumes:
      - ./bupzo-admin:/app # Mount admin code
      - /app/node_modules # Avoids re-installing node_modules inside container
    command: ["npm", "run", "dev"]

volumes:
  pgdata_new:
  redisdata_new:
  miniodata_new:
