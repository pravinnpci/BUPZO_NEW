version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: bupzodb
    restart: unless-stopped
    environment:
      POSTGRES_USER: bupzo
      POSTGRES_PASSWORD: bupzo
      POSTGRES_DB: bupzo
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./setup_db.sql:/docker-entrypoint-initdb.d/setup_db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bupzo"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./bupzobackend
      dockerfile: Dockerfile
    container_name: bupzobackend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://bupzo:bupzo@postgres:5432/bupzo
      APP_HOST: 0.0.0.0
      APP_PORT: 8003
      DEBUG: "False"
    ports:
      - "8003:8003"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./bupzobackend:/app/bupzobackend
    working_dir: /app/bupzobackend
    command: uvicorn main:app --host 0.0.0.0 --port 8003

  frontend:
    build:
      context: ./bupzofrontend
      dockerfile: Dockerfile
    container_name: bupzofrontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./bupzofrontend:/app/bupzofrontend
    working_dir: /app/bupzofrontend
    command: sh -c "npm install && npm run build && npm run start"

volumes:
  postgres_data: