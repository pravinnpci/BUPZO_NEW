version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: bupzo_db
    environment:
      POSTGRES_DB: bupzo_db
      POSTGRES_USER: bupzo_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-bupzo_password}
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bupzo_user -d bupzo_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: bupzo_redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./bupzobackend
      dockerfile: Dockerfile
    container_name: bupzo_backend
    ports:
      - "8003:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=bupzo_db
      - DB_USER=bupzo_user
      - DB_PASSWORD=${DB_PASSWORD:-bupzo_password}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 5s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./bupzofrontend
      dockerfile: Dockerfile
    container_name: bupzo_frontend
    ports:
      - "3003:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8003/api
      - NEXT_PUBLIC_REDIS_URL=redis://redis:6379
    depends_on:
      backend:
        condition: service_healthy

  mcp-server:
    build:
      context: ./bupzomcp
      dockerfile: Dockerfile
    container_name: bupzo_mcp_server
    ports:
      - "3004:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000

volumes:
  postgres_data:
  redis_data: