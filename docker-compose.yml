version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: bupzo_db
    environment:
      POSTGRES_USER: bupzo_user
      POSTGRES_PASSWORD: bupzo_password
      POSTGRES_DB: bupzo_db
    volumes:
      - ./setup_db.sql:/docker-entrypoint-initdb.d/setup_db.sql
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bupzo_user -d bupzo_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: bupzo_redis
    ports:
      - "6380:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend-api:
    build:
      context: ./bupzobackend
      dockerfile: Dockerfile
    container_name: bupzo_backend
    environment:
      DATABASE_URL: postgresql://bupzo_user:bupzo_password@db:5432/bupzo_db
      REDIS_URL: redis://redis:6379
      SECRET_KEY: your-secret-key-here
    ports:
      - "8003:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./bupzobackend:/app
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000"]

  mcp-server:
    build:
      context: ./bupzomcp
      dockerfile: Dockerfile
    container_name: bupzo_mcp
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://bupzo_user:bupzo_password@db:5432/bupzo_db
      GEMINI_API_KEY: ""
      WHATSAPP_API_TOKEN: ""
      PHONE_NUMBER_ID: ""
    ports:
      - "3004:3004"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./bupzomcp:/app
    restart: unless-stopped

  frontend:
    build:
      context: ./bupzofrontend
      dockerfile: Dockerfile
    container_name: bupzo_frontend
    ports:
      - "3003:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://backend-api:8000
      NEXT_PUBLIC_MCP_URL: http://mcp-server:3004
    depends_on:
      - backend-api
      - mcp-server
    volumes:
      - ./bupzofrontend:/app
      - /app/node_modules
    restart: unless-stopped

volumes:
  pgdata:
  redisdata: