services:
  db:
    image: postgres:13
    container_name: bupzo_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bupzo
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: bupzo_redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend-api:
    build:
      context: ./bupzobackend
      dockerfile: Dockerfile
    container_name: bupzo_backend
    ports:
      - "8003:8003"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/bupzo
      - UPSTASH_REDIS_REST_URL=redis://redis:6379
      - UPSTASH_REDIS_REST_TOKEN=
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY}
      - WHATSAPP_API_TOKEN=${WHATSAPP_API_TOKEN}
      - BREVO_API_KEY=${BREVO_API_KEY}
      - PAYMENT_KEY_ID=${PAYMENT_KEY_ID}
      - PAYMENT_KEY_SECRET=${PAYMENT_KEY_SECRET}
      - PHONEPE_MERCHANT_ID=${PHONEPE_MERCHANT_ID}
      - PHONEPE_SALT_KEY=${PHONEPE_SALT_KEY}
      - SHIPROCKET_EMAIL=${SHIPROCKET_EMAIL}
      - SHIPROCKET_PASSWORD=${SHIPROCKET_PASSWORD}
      - NIMBUSPOST_API_KEY=${NIMBUSPOST_API_KEY}
      - DELHIVERY_API_TOKEN=${DELHIVERY_API_TOKEN}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8003"]
    restart: unless-stopped

  frontend-client:
    build:
      context: ./bupzofrontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_BASE_PATH=/
        - NEXT_PUBLIC_PORT=3000
    container_name: bupzo_frontend
    ports:
      - "3003:3003"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8003
      - NEXT_PUBLIC_PORT=3003
    depends_on:
      - backend-api
    command: ["npm", "run", "dev", "--", "-p", "3000"]
    restart: unless-stopped

  frontend-admin:
    build:
      context: ./bupzofrontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_BASE_PATH=/admin
        - NEXT_PUBLIC_PORT=3000
    container_name: bupzo_frontend_admin
    ports:
      - "3005:3005"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8003
      - NEXT_PUBLIC_PORT=3005
    depends_on:
      - backend-api
    command: ["npm", "run", "dev", "--", "-p", "3000"]
    restart: unless-stopped

  mcp-server:
    build:
      context: ./bupzomcp
      dockerfile: Dockerfile
    container_name: bupzo_mcp
    ports:
      - "3004:3004"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/bupzo
      - UPSTASH_REDIS_REST_URL=redis://redis:6379
      - UPSTASH_REDIS_REST_TOKEN=
      - WHATSAPP_API_TOKEN=${WHATSAPP_API_TOKEN}
      - BREVO_API_KEY=${BREVO_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY} # MCP Server also needs AI key
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["node", "index.js"]
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data: