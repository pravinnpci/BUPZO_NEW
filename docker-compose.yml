services:
  db:
    image: postgres:15-alpine
    container_name: bupzo_db
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: bupzo_user
      POSTGRES_PASSWORD: bupzo_password
      POSTGRES_DB: bupzo_db
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./setup_db.sql:/docker-entrypoint-initdb.d/setup_db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bupzo_user -d bupzo_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: bupzo_redis
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend-api:
    build: ./bupzobackend
    container_name: bupzo_backend
    ports:
      - "8003:8003"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend-client:
    build: ./bupzofrontend
    container_name: bupzo_frontend
    ports:
      - "3003:3003"
    env_file: .env
    depends_on:
      - backend-api

  mcp-server:
    build: ./bupzomcp
    container_name: bupzo_mcp
    ports:
      - "3004:3004"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata: